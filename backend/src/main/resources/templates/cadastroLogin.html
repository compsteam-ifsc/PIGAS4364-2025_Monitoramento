<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login & Registro</title>
   <link rel="stylesheet" th:href="@{/css/login/login.css}">
</head>
<body>

<div class="container">
    <div class="box">

        
        <div id="login">
            <h2>Login</h2>
            <input type="text" id="loginUser" placeholder="Usuário">
            <input type="password" id="loginPass" placeholder="Senha">
            <button onclick="login()">Entrar</button>
            <p>Não tem conta? <span onclick="mostrarRegistro()">Registrar</span></p>
        </div>

        
        <div id="register" class="hidden">
            <h2>Registrar</h2>
            <input type="text" id="registerUser" placeholder="Usuário">
            <input type="password" id="registerPass" placeholder="Senha">
            <button onclick="registrar()">Cadastrar</button>
            <p>Já tem conta? <span onclick="mostrarLogin()">Login</span></p>
        </div>

    </div>
</div>
<script th:src="@{/JS/login/parteDologin.js}"></script>
<script th:src="@{/JS/login/login.js}"></script>
</body>
</html>
