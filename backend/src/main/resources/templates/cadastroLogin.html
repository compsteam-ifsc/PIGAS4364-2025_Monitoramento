<head>
    <link rel="stylesheet" href="/css/login/login.css">
</head>

<div class="auth-container">
  <!-- Pills navs -->
  <ul class="nav nav-pills nav-justified mb-3" id="ex1" role="tablist">
    <li class="nav-item" role="presentation">
      <a class="nav-link active" id="tab-login" href="#pills-login" role="tab">Login</a>
    </li>
    <li class="nav-item" role="presentation">
      <a class="nav-link" id="tab-register" href="#pills-register" role="tab">Register</a>
    </li>
  </ul>

  <!-- Pills content -->
  <div class="tab-content">
    <!-- LOGIN -->
    <div class="tab-pane show active" id="pills-login" role="tabpanel">
      <form>
        <div class="text-center">
          <p>Sign in with:</p>
          <div class="social-buttons">
            <button type="button" class="btn-floating"><i class="fab fa-facebook-f"></i></button>
            <button type="button" class="btn-floating"><i class="fab fa-google"></i></button>
            <button type="button" class="btn-floating"><i class="fab fa-twitter"></i></button>
            <button type="button" class="btn-floating"><i class="fab fa-github"></i></button>
          </div>
        </div>

        <p class="separator">or:</p>

        <div class="form-outline">
          <input type="email" id="loginName" class="form-control" placeholder="Email or username" />
        </div>

        <div class="form-outline">
          <input type="password" id="loginPassword" class="form-control" placeholder="Password" />
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="loginCheck" checked />
              <label class="form-check-label" for="loginCheck">Remember me</label>
            </div>
          </div>

          <div class="col-md-6" style="text-align: right;">
            <a href="#!">Forgot password?</a>
          </div>
        </div>

        <button type="submit" class="btn-primary">Sign in</button>

        <div class="bottom-text">
          <p>Not a member? <a href="#!">Register</a></p>
        </div>
      </form>
    </div>

    <!-- REGISTER -->
    <div class="tab-pane" id="pills-register" role="tabpanel">
      <form>
        <div class="text-center">
          <p>Sign up with:</p>
          <div class="social-buttons">
            <button type="button" class="btn-floating"><i class="fab fa-facebook-f"></i></button>
            <button type="button" class="btn-floating"><i class="fab fa-google"></i></button>
            <button type="button" class="btn-floating"><i class="fab fa-twitter"></i></button>
            <button type="button" class="btn-floating"><i class="fab fa-github"></i></button>
          </div>
        </div>

        <p class="separator">or:</p>

        <div class="form-outline">
          <input type="text" id="registerName" class="form-control" placeholder="Name" />
        </div>

        <div class="form-outline">
          <input type="text" id="registerUsername" class="form-control" placeholder="Username" />
        </div>

        <div class="form-outline">
          <input type="email" id="registerEmail" class="form-control" placeholder="Email" />
        </div>

        <div class="form-outline">
          <input type="password" id="registerPassword" class="form-control" placeholder="Password" />
        </div>

        <div class="form-outline">
          <input type="password" id="registerRepeatPassword" class="form-control" placeholder="Repeat password" />
        </div>

        <div class="form-check register-check">
          <input class="form-check-input" type="checkbox" id="registerCheck" checked />
          <label class="form-check-label" for="registerCheck">
            I have read and agree to the terms
          </label>
        </div>

        <button type="submit" class="btn-primary">Sign in</button>
      </form>
    </div>
  </div>
</div>
