<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login & Registro</title>
    <link rel="stylesheet" th:href="@{/css/login/login.css}">
</head>
<body>

<div class="container">

    <!-- LOGO IFSC -->
    <img 
        src="https://www.ifsc.edu.br/image/layout_set_logo?img_id=48632&t=1774934283789" 
        alt="Logo IFSC" 
        class="logo-ifsc-login"
    >

    <!-- LOGO COMP STEAM -->
    <div class="brand-header">
       <!-- <img th:src="@{/img/logo-comp.png}" alt="Logo COMP STEAM" class="logo-comp-steam">-->

        <div class="brand-name">
            <span class="comp">COMP</span>
            <span class="divider">|</span>
            <span class="steam">STEAM</span>
        </div>
    </div>

    <div class="box">

        <!-- MENSAGEM -->
        <div th:if="${message}" th:class="'alert '+${alertClass}">
            <span th:text="${message}"></span>
        </div>

        <!-- LOGIN -->
        <div id="login">
            <form th:action="@{/login}" method="post">
                
                <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"> -->

                <h2>Login</h2>

                <input type="text" name="username" placeholder="Usuário" required>
                <input type="password" name="password" placeholder="Senha" required>

                <button type="submit">Entrar</button>
                <p>Não tem conta? <span onclick="mostrarRegistro()">Registrar</span></p>
            </form>
        </div>

        <!-- REGISTRO -->
        <form th:action="@{/auth/register}" method="post">
            <div id="register" class="hidden">

               
                <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"> -->

                <h2>Registrar</h2>

                <input type="text" name="registerUser" placeholder="Usuário" required>
                <input type="password" name="registerPass" placeholder="Senha" required>

                <button type="submit">Cadastrar</button>
                <p>Já tem conta? <span onclick="mostrarLogin()">Login</span></p>
            </div>
        </form>

    </div>
</div>

<script th:src="@{/JS/login/parteDologin.js}"></script>

</body>
</html>
