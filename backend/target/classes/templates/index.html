<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <img src="https://www.ifsc.edu.br/image/layout_set_logo?img_id=48632&t=1774934283789" alt="Logo IFSC" class="logo-ifsc">
  
  <input type="date" id="dataInput">

  <div class="dashboard-container">

    <div class="card chart-card">
      <div class="chart-wrapper">
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="card info-card">
      <h2 class="info-title">Resumo do Dia</h2>

      <div class="info-item">
        <span class="info-label">Quantidade de pessoas que entraram ao longo do dia:</span>
        <span class="info-value" id="totalEntradas">--</span>
      </div>

      <div class="info-item">
        <span class="info-label">Horário da primeira pessoa que entrou:</span>
        <span class="info-value" id="primeiraEntrada">--:--</span>
      </div>

      <div class="info-item">
        <span class="info-label">Horário da última pessoa que saiu:</span>
        <span class="info-value" id="ultimaSaida">--:--</span>
      </div>
    </div>

  </div>

  <form action="/logout" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit">Logout</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/JS/script.js"></script>

</body>
</html>
