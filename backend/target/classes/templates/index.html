<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Diário</title>

  <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>

  <header class="top-bar">

    <!-- ESQUERDA - IFSC -->
    <div class="top-logo">
      <img
        src="https://www.ifsc.edu.br/image/layout_set_logo?img_id=48632&t=1774934283789"
        alt="IFSC"
        class="logo-ifsc"
      >
    </div>

    <!-- CENTRO -->
    <div class="top-center">
      <h1 class="page-title">Relatório Diário</h1>

      <div class="date-wrapper">
        <label class="date-label">Selecione a data</label>
        <input type="date" id="dataInput">
      </div>
    </div>

    <!-- DIREITA -->
    <div class="user-area">

      <!-- LOGO DO PROJETO -->
      <img src="/img/comp.png" alt="Projeto" class="logo-projeto">

      <span class="user-name" th:text="${nomeUsuario}">Usuário</span>

      <form th:action="@{/logout}" method="post" class="logout-top">
        <button type="submit">Logout</button>
      </form>

    </div>

  </header>

  <main class="dashboard-container">

    <section class="card chart-card">
      <div class="chart-header">
        <h2 class="section-title">Movimentação do Dia</h2>
      </div>

      <div class="chart-wrapper">
        <canvas id="barChart"></canvas>
      </div>
    </section>

    <section class="card info-card">
      <h2 class="info-title">Resumo do Dia</h2>

      <div class="stats-grid">

        <div class="stat-box">
          <span class="stat-label">Entradas</span>
          <span class="stat-value" id="totalEntradas">--</span>
        </div>

        <div class="stat-box">
          <span class="stat-label">Primeira Entrada</span>
          <span class="stat-value" id="primeiraEntrada">--:--</span>
        </div>

        <div class="stat-box">
          <span class="stat-label">Última Saída</span>
          <span class="stat-value" id="ultimaSaida">--:--</span>
        </div>

      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script th:src="@{/JS/script.js}" src="/JS/script.js"></script>

</body>
</html>
